<header class="nav-wrap">
  <nav class="nav-pill">
    <a class="brand" routerLink="/" aria-label="Task Manager home">
      <span class="brand-mark"><mat-icon>bolt</mat-icon></span>
      <span class="brand-name">Task<span class="brand-accent">Manager</span></span>
    </a>

    @if (auth.isAuthenticated()) {
      <div class="nav-links">
        <a class="pill-link" routerLink="/tasks" routerLinkActive="active">
          <mat-icon>checklist</mat-icon><span>Tasks</span>
        </a>
      </div>
      <div class="nav-end">
        <span class="avatar" [title]="auth.user()?.username ?? ''">{{ initials() }}</span>
        <button mat-icon-button class="logout-btn" (click)="auth.logout()" aria-label="Log out">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
      <button mat-icon-button class="hamburger" [matMenuTriggerFor]="menu" aria-label="Open menu">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <a mat-menu-item routerLink="/tasks"><mat-icon>checklist</mat-icon><span>Tasks</span></a>
        <button mat-menu-item (click)="auth.logout()"><mat-icon>logout</mat-icon><span>Logout</span></button>
      </mat-menu>
    } @else {
      <div class="nav-links">
        <a class="pill-link" routerLink="/login" routerLinkActive="active">
          <mat-icon>login</mat-icon><span>Login</span>
        </a>
        <a class="pill-link primary" routerLink="/register" routerLinkActive="active">
          <mat-icon>person_add</mat-icon><span>Register</span>
        </a>
      </div>
      <button mat-icon-button class="hamburger" [matMenuTriggerFor]="menu" aria-label="Open menu">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <a mat-menu-item routerLink="/login"><mat-icon>login</mat-icon><span>Login</span></a>
        <a mat-menu-item routerLink="/register"><mat-icon>person_add</mat-icon><span>Register</span></a>
      </mat-menu>
    }
  </nav>
</header>
<main>
  <router-outlet />
</main>
